<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World - Cargando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: linear-gradient(
                180deg,
                #080C26 0%,
                #251A63 38%,
                #9A3242 72%,
                #FF7620 92%,
                #FFCC32 100%
            );
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            position: relative;
            overflow: hidden;
            transition: opacity 1.2s ease;
        }

        .desvanecer { opacity: 0; pointer-events: none; }

        .estrella {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            animation: parpadear 3.5s infinite ease-in-out;
        }

        @keyframes parpadear {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .logo-z {
            font-size: clamp(7rem, 22vw, 11rem);
            font-weight: bold;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 22px #A1B9FF, 0 0 45px #6189FF, 0 0 70px #4567FF;
            animation: brillar 3s ease-in-out infinite alternate;
        }

        @keyframes brillar {
            from { text-shadow: 0 0 18px #A1B9FF, 0 0 36px #6189FF, 0 0 54px #4567FF; }
            to { text-shadow: 0 0 30px #C1D9FF, 0 0 60px #81ABFF, 0 0 90px #6189FF; }
        }

        .titulo {
            font-size: clamp(2.2rem, 9vw, 3.2rem);
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 3.5rem;
        }

        .contenedor-barra {
            width: 85%;
            max-width: 480px;
            height: 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            overflow: hidden;
        }

        .barra-progreso {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFCC32, #FF7620, #9A32CC, #4567FF);
            border-radius: 20px;
            animation: cargar 3.2s ease-in-out forwards;
        }

        @keyframes cargar {
            0% { width: 0%; }
            25% { width: 25%; }
            50% { width: 55%; }
            75% { width: 80%; }
            100% { width: 100%; }
        }

        .texto-carga {
            margin-top: 2rem;
            font-size: 1.5rem;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <script>
        for (let i = 0; i < 80; i++) {
            const estrella = document.createElement('div');
            estrella.classList.add('estrella');
            const tamano = Math.random() * 2.5 + 0.8;
            estrella.style.width = `${tamano}px`;
            estrella.style.height = `${tamano}px`;
            estrella.style.left = `${Math.random() * 100}%`;
            estrella.style.top = `${Math.random() * 100}%`;
            estrella.style.animationDelay = `${Math.random() * 4}s`;
            document.body.appendChild(estrella);
        }
    </script>

    <div class="logo-z">Z</div>
    <h1 class="titulo">ZENTRITH WORLD</h1>

    <div class="contenedor-barra">
        <div class="barra-progreso"></div>
    </div>

    <p class="texto-carga" id="textoEstado">Iniciando sistemas seguros...</p>

    <script>
        const mensajes = [
            "Iniciando sistemas seguros...",
            "Preparando Zentrith World...",
            "Conectando servidores...",
            "Cargando archivos...",
            "¡Casi listo!"
        ];
        const texto = document.getElementById("textoEstado");
        let indice = 0;

        const intervalo = setInterval(() => {
            texto.textContent = mensajes[indice];
            indice++;
            if (indice >= mensajes.length) clearInterval(intervalo);
        }, 750);

        setTimeout(() => {
            texto.textContent = "¡Listo!";
            setTimeout(() => {
                document.body.classList.add("desvanecer");
                setTimeout(() => {
                    window.location.href = "inicio.html";
                }, 1200);
            }, 1000);
        }, 3300);
    </script>
</body>
</html>
