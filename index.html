<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
        body{background:#051027;color:#E2F0FF;min-height:100vh}
        .oculto{display:none!important}

        /* Pantalla de carga - AZUL MÁS FUERTE */
        .pantalla-carga{position:fixed;inset:0;background:#051027;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000}
        .titulo-carga{font-size:3rem;color:#3B82F6;margin-bottom:12px;font-weight:700}
        .subtitulo{font-size:1.2rem;color:#93C5FD;margin-bottom:30px;text-align:center}
        .barra-carga{width:80%;max-width:400px;height:12px;background:#0F2044;border-radius:10px;overflow:hidden;border:1px solid #1E3A8A}
        .progreso{width:0%;height:100%;background:#2563EB;transition:width .04s linear}
        .texto-carga{margin-top:15px;font-size:1.1rem;color:#BFDBFE}

        /* Resto de estilos */
        .pantalla-servidores{max-width:550px;margin:40px auto;padding:20px;text-align:center}
        .servidor{padding:18px;margin:12px 0;border-radius:10px;border:1px solid #1E3A8A;background:#0F2044;cursor:pointer}
        .servidor.activo{border-color:#3B82F6;background:#102859}
        .boton{padding:14px 24px;margin:10px;border:none;border-radius:8px;font-size:1rem;background:#2563EB;color:white;cursor:pointer}
    </style>
</head>
<body>

<div class="pantalla-carga" id="pantallaCarga">
    <h1 class="titulo-carga">ZENTRITH WORLD</h1>
    <p class="subtitulo">ESPACIO SEGURO PARA JUGAR Y CREAR</p>
    <div class="barra-carga"><div class="progreso" id="progreso"></div></div>
    <p class="texto-carga" id="estadoCarga">Cargando... 0%</p>
</div>

<div class="pantalla-servidores oculto" id="pantallaServidores">
    <h2 style="color:#93C5FD;margin-bottom:25px">🌐 Elegí tu servidor</h2>
    <div class="servidor activo" onclick="elegir(1)">🟢 Servidor 1 - Zentrith Norte</div>
    <div class="servidor activo" onclick="elegir(2)">🟢 Servidor 2 - Zentrith Sur</div>
</div>

<script>
// ⚙️ ESTADO DEL JUEGO: AQUÍ CONTROLAS SI ESTÁ PRENDIDO O APAGADO
const ESTADO = {
    activo: true,  // ✅ true = PRENDIDO / false = MODO DESCANSO
    maxServidores: 10
};

// 🚀 CARGA QUE SÍ AVANZA
let porcentaje = 0;
const barra = document.getElementById('progreso');
const texto = document.getElementById('estadoCarga');
const pantalla = document.getElementById('pantallaCarga');
const servidores = document.getElementById('pantallaServidores');

const intervalo = setInterval(() => {
    if (porcentaje < 100) {
        porcentaje++;
        barra.style.width = porcentaje + '%';
        texto.textContent = `Cargando... ${porcentaje}%`;
    } else {
        clearInterval(intervalo);
        texto.textContent = "¡Listo!";
        setTimeout(() => {
            pantalla.classList.add('oculto');
            if (ESTADO.activo) servidores.classList.remove('oculto');
            else document.body.style.filter = 'grayscale(35%) brightness(0.6)';
        }, 700);
    }
}, 30);

function elegir(num) {
    alert(`✅ Conectado al Servidor ${num}`);
    // Acá seguimos agregando lo que falte
}
</script>

</body>
</html>
