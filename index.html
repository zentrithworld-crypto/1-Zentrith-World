<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World - Cargando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(
                135deg,
                #05081A 0%,
                #121840 25%,
                #451A75 50%,
                #FF5A20 75%,
                #FFD330 100%
            );
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Estrellas parpadeantes */
        .estrella {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: parpadear 4s infinite ease-in-out;
        }

        @keyframes parpadear {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Z grande: gira y brilla al mismo tiempo */
        .letra-z {
            font-size: clamp(8rem, 25vw, 13rem);
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 1rem;
            transform-origin: center center;
            animation: girarSuave 6s linear infinite, brillar 3s ease-in-out infinite alternate;
        }

        @keyframes girarSuave {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes brillar {
            from {
                text-shadow: 0 0 15px #93C5FD, 0 0 30px #3B82F6, 0 0 45px #7C3AED;
            }
            to {
                text-shadow: 0 0 25px #BFDBFE, 0 0 50px #60A5FA, 0 0 75px #A855F7;
            }
        }

        /* Nombre del juego */
        .nombre-juego {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 15px #60A5FA;
            margin-bottom: 3.5rem;
            letter-spacing: 2px;
        }

        /* Barra de progreso */
        .contenedor-barra {
            width: 85%;
            max-width: 460px;
            height: 12px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.25);
        }

        .barra-progreso {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD330, #FF6025, #9333EA, #3B82F6);
            border-radius: 10px;
            animation: cargar 3.2s ease-in-out forwards;
        }

        @keyframes cargar {
            0%   { width: 0%; }
            25%  { width: 25%; }
            50%  { width: 55%; }
            75%  { width: 78%; }
            100% { width: 100%; }
        }

        /* Texto de estado */
        .texto-carga {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            color: #E0F2FE;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            min-height: 1.8rem;
            text-align: center;
            padding: 0 1rem;
        }

        /* Versión del juego */
        .version {
            position: absolute;
            bottom: 2rem;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Generar estrellas de fondo -->
    <script>
        for (let i = 0; i < 70; i++) {
            const estrella = document.createElement('div');
            estrella.classList.add('estrella');
            const tamano = Math.random() * 3 + 1;
            estrella.style.width = `${tamano}px`;
            estrella.style.height = `${tamano}px`;
            estrella.style.left = `${Math.random() * 100}%`;
            estrella.style.top = `${Math.random() * 100}%`;
            estrella.style.animationDelay = `${Math.random() * 4}s`;
            document.body.appendChild(estrella);
        }
    </script>

    <div class="letra-z">Z</div>
    <h1 class="nombre-juego">ZENTRITH WORLD</h1>

    <div class="contenedor-barra">
        <div class="barra-progreso"></div>
    </div>

    <p class="texto-carga" id="mensajeCarga">Iniciando sistemas seguros...</p>

    <div class="version">Versión Alpha 0.1</div>

    <!-- Lógica de mensajes y cambio de pantalla -->
    <script>
        const mensajes = [
            "Iniciando sistemas seguros...",
            "Preparando Zentrith World...",
            "Conectando servidores...",
            "Cargando mundos y creaciones...",
            "Verificando protección de datos...",
            "Cargando perfiles y avatares...",
            "Ajustando configuración...",
            "¡Casi listo para jugar!"
        ];

        const elementoMensaje = document.getElementById("mensajeCarga");
        let indice = 0;

        // Cambiar mensaje cada 700ms
        const intervalo = setInterval(() => {
            elementoMensaje.textContent = mensajes[indice];
            indice = (indice + 1) % mensajes.length;
        }, 700);

        // Al terminar carga, ir a la pantalla siguiente
        setTimeout(() => {
            clearInterval(intervalo);
            elementoMensaje.textContent = "¡Listo!";
            // Descomentá esta línea cuando tengas lista la pantalla de inicio:
            // window.location.href = "inicio.html";
        }, 3300);
    </script>
</body>
</html>
