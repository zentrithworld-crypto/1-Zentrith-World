<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #08152E;
            color: #E2E8F0;
            min-height: 100vh;
            padding-bottom: 85px;
            overflow-x: hidden;
        }

        /* -------------------------- */
        /* PANTALLA DE CARGA CORRECTA */
        /* -------------------------- */
        .pantalla-carga {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #08152E;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.8s ease;
        }

        .pantalla-carga.oculta {
            opacity: 0;
            pointer-events: none;
        }

        .titulo-carga {
            font-size: 3rem;
            text-align: center;
            color: #60A5FA;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitulo-carga {
            font-size: 1.2rem;
            color: #93C5FD;
            margin-bottom: 30px;
            text-align: center;
        }

        .barra-carga {
            width: 80%;
            max-width: 400px;
            height: 12px;
            background-color: #0D1B3D;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #1E293B;
        }

        .progreso {
            width: 0%;
            height: 100%;
            background-color: #2563EB;
            border-radius: 10px;
            transition: width 0.05s linear;
        }

        .texto-carga {
            font-size: 1rem;
            color: #CBD5E1;
            min-height: 1.5rem;
        }

        /* -------------------------- */
        /* ENCABEZADO */
        /* -------------------------- */

            background-color: #0D1B3D;

            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1E293B;
            position: sticky;
            top: 0;
            z-index: 100;
        }

            font-weight: 700;
            color: #60A5FA;
