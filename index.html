<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World - Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #05081A 0%, #1A1E52 50%, #2E1A70 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
            overflow: hidden;
            transition: opacity 1.2s ease;
        }

        /* Nombre principal del juego */
        .logo-principal {
            font-size: clamp(3rem, 12vw, 4.5rem);
            font-weight: bold;
            color: #FFD330;
            text-align: center;
            text-shadow: 
                0 0 20px rgba(255, 211, 48, 0.7),
                0 0 40px rgba(59, 130, 246, 0.5);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: scale(0.8);
            animation: aparecerLogo 1.5s ease-out forwards;
        }

        @keyframes aparecerLogo {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtítulo */
        .subtitulo {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            color: #E0F2FE;
            text-align: center;
            margin-bottom: 4rem;
            opacity: 0;
            animation: aparecerTexto 1.5s ease-out 0.5s forwards;
        }

        @keyframes aparecerTexto {
            to { opacity: 1; }
        }

        /* Botones de acceso */
        .contenedor-botones {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: aparecerBotones 1.5s ease-out 1s forwards;
        }

        .boton {
            padding: 1.2rem;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #3B82F6, #2563EB);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        /* Versión abajo */
        .version {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: aparecerTexto 1.5s ease-out 1.5s forwards;
        }
    </style>
</head>
<body>

    <h1 class="logo-principal">ZENTRITH WORLD</h1>
    <p class="subtitulo">Espacio seguro para jugar y crear</p>

    <div class="contenedor-botones">
        <button class="boton" onclick="irASesion()">Iniciar Sesión</button>
        <button class="boton" onclick="irACrear()">Crear Cuenta</button>
        <button class="boton" onclick="irAInvitado()">Entrar como Invitado</button>
    </div>

    <div class="version">Versión Alpha 0.1</div>

    <script>
        // Acá conectás con las pantallas siguientes cuando las tengas
        function irASesion() {
            // window.location.href = "iniciar-sesion.html";
            console.log("Ir a Iniciar Sesión");
        }

        function irACrear() {
            // window.location.href = "crear-cuenta.html";
            console.log("Ir a Crear Cuenta");
        }

        function irAInvitado() {
            // window.location.href = "entrar-invitado.html";
            console.log("Ir a Entrar como Invitado");
        }
    </script>

</body>
</html>
