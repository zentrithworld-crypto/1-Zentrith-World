<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World - Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121840 0%, #251B66 50%, #451A75 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
            overflow: hidden;
        }

        /* Contenedor de las mascotas y saludo */
        .zona-bienvenida {
            text-align: center;
            margin-bottom: 3rem;
            opacity: 1;
            transition: opacity 1.5s ease;
        }

        .mascotas {
            font-size: clamp(3rem, 12vw, 5rem);
            margin-bottom: 1.5rem;
            animation: flotar 4s ease-in-out infinite alternate;
        }

        @keyframes flotar {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .saludo {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            color: #E0F2FE;
            text-shadow: 0 0 12px rgba(96, 165, 250, 0.6);
        }

        /* Clase para ocultar el saludo */
        .ocultar {
            opacity: 0;
            pointer-events: none;
        }

        /* Nombre del juego */
        h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            color: #FFD330;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 211, 48, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.2s ease 0.5s;
        }

        /* Botones */
        .botones {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.2s ease 0.7s;
        }

        .boton {
            padding: 1.1rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #3B82F6, #2563EB);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        /* Mostrar elementos después de la animación */
        .mostrar {
            opacity: 1;
            transform: translateY(0);
        }

        /* Versión del juego */
        .version {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Zona de bienvenida con mascotas -->
    <div class="zona-bienvenida" id="bienvenida">
        <div class="mascotas">🦊 🦔</div>
        <p class="saludo">¡Hola! Bienvenido a Zentrith World</p>
    </div>

    <h1 id="titulo">ZENTRITH WORLD</h1>

    <div class="botones" id="botones">
        <button class="boton">Iniciar Sesión</button>
        <button class="boton">Crear Cuenta</button>
        <button class="boton">Entrar como Invitado</button>
    </div>

    <div class="version">Versión Alpha 0.1</div>

    <!-- Lógica de animación -->
    <script>
        // Después de 3 segundos, ocultar saludo y mostrar el resto
        setTimeout(() => {
            document.getElementById("bienvenida").classList.add("ocultar");
            document.getElementById("titulo").classList.add("mostrar");
            document.getElementById("botones").classList.add("mostrar");
        }, 3000);
    </script>

</body>
</html>
