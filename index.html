<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: linear-gradient(180deg, #080C26 0%, #251A63 38%, #9A3242 72%, #FF7620 92%, #FFCC32 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow: hidden;
            transition: opacity 1.2s ease;
        }

        /* Control de visibilidad */
        .pantalla {
            position: absolute;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .oculto { display: none !important; }
        .desvanecer { opacity: 0; pointer-events: none; }

        /* Estrellas */
        .estrella {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: parpadear 3.5s infinite ease-in-out;
        }
        @keyframes parpadear { 0%,100% {opacity:0.2;} 50% {opacity:1;} }

        /* Animaciones */
        @keyframes girarZ { from {transform: rotateY(0deg);} to {transform: rotateY(360deg);} }
        @keyframes brillar {
            from {text-shadow:0 0 18px #A1B9FF,0 0 36px #6189FF,0 0 54px #4567FF;}
            to {text-shadow:0 0 30px #C1D9FF,0 0 60px #81ABFF,0 0 90px #6189FF;}
        }

        /* Carga */
        .logo-z {
            font-size: clamp(7rem, 22vw, 11rem);
            font-weight: bold;
            animation: girarZ 6s linear infinite, brillar 3s ease-in-out infinite alternate;
        }
        .titulo { font-size: clamp(2.2rem, 9vw, 3.2rem); margin-bottom: 3.5rem; letter-spacing: 2px; }
        .contenedor-barra { width: 85%; max-width: 480px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; }
        .barra-progreso { height: 100%; width: 0%; background: linear-gradient(90deg, #FFCC32, #FF7620, #9A32CC, #4567FF); border-radius: 20px; animation: cargar 3.2s ease forwards; }
        @keyframes cargar { 0%{width:0;} 100%{width:100%;} }
        .texto-carga { margin-top: 2rem; font-size: 1.5rem; }

        /* Elementos comunes */
        .version { position: absolute; top: 1.5rem; font-size: 1rem; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
        .logo { font-size: clamp(6rem, 20vw, 9rem); animation: brillar 3s ease infinite alternate; }
        .subtitulo { font-size: clamp(2rem, 8vw, 2.8rem); margin-bottom: 2.5rem; text-align: center; }
        .contenedor { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1rem; z-index: 2; }
        input { padding: 1rem; border: none; border-radius: 10px; background: rgba(255,255,255,0.15); color: #fff; font-size: 1rem; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.6); }
        .boton { padding: 1rem; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s; }
        .boton:hover { transform: translateY(-2px); }
        .boton-naranja { background: linear-gradient(90deg, #FFCC32, #FF7620); color: #000; }
        .boton-azul { background: linear-gradient(90deg, #9A32CC, #4567FF); color: #fff; }
        .separador { text-align: center; margin: 0.5rem 0; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <!-- Estrellas -->
    <script>
        for (let i = 0; i < 80; i++) {
            const e = document.createElement('div');
            e.className = 'estrella';
            const t = Math.random() * 2.5 + 0.8;
            e.style.width = e.style.height = `${t}px`;
            e.style.left = `${Math.random() * 100}%`;
            e.style.top = `${Math.random() * 100}%`;
            e.style.animationDelay = `${Math.random() * 4}s`;
            document.body.appendChild(e);
        }
    </script>

    <!-- 1. Carga -->
    <div id="carga" class="pantalla">
        <div class="logo-z">Z</div>
        <h1 class="titulo">ZENTRITH WORLD</h1>
        <div class="contenedor-barra"><div class="barra-progreso"></div></div>
        <p class="texto-carga" id="estado">Iniciando sistemas seguros...</p>
    </div>

    <!-- 2. Acceso -->
    <div id="acceso" class="pantalla oculto">
        <div class="version">Versión 0.1</div>
        <div class="logo">Z</div>
        <h1 class="subtitulo">ZENTRITH WORLD</h1>
        <div class="contenedor">
            <input type="email" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">
            <button class="boton boton-naranja" onclick="irMenu('usuario')">Iniciar Sesión</button>
            <button class="boton boton-azul" onclick="mostrarCrear()">Crear Cuenta</button>
            <div class="separador">o</div>
            <button class="boton boton-azul" onclick="irMenu('invitado')">Entrar como Invitado</button>
        </div>
    </div>

    <!-- 3. Crear Cuenta -->
    <div id="crear" class="pantalla oculto">
        <div class="version">Versión 0.1</div>
        <h2 class="subtitulo">Crear tu cuenta</h2>
        <div class="contenedor">
            <input type="text" placeholder="Tu nombre">
            <input type="text" placeholder="Usuario">
            <input type="email" placeholder="Correo electrónico">
            <input type="number" min="6" max="120" placeholder="Tu edad">
            <input type="password" placeholder="Contraseña">
            <button class="boton boton-naranja" onclick="irMenu('usuario')">Guardar y entrar</button>
            <button class="boton boton-azul" onclick="volver()">Volver</button>
        </div>
    </div>

    <!-- 4. Menú Principal -->
    <div id="menu" class="pantalla oculto">
        <div class="version">Versión 0.1</div>
        <div class="logo">Z</div>
        <h1 class="subtitulo" id="tituloMenu">Menú Principal</h1>
        <div class="contenedor">
            <button class="boton boton-naranja">Jugar</button>
            <button class="boton boton-azul">Mis Mundos</button>
            <button class="boton boton-azul">Configuración</button>
            <button class="boton boton-azul">Ayuda</button>
            <button class="boton boton-azul" onclick="volver()">Salir</button>
        </div>
    </div>

    <!-- Lógica -->
    <script>
        const mensajes = [
            "Iniciando sistemas seguros...",
            "Preparando Zentrith World...",
            "Conectando servidores...",
            "Cargando archivos...",
            "¡Casi listo!"
        ];
        const estado = document.getElementById("estado");
        let idx = 0;
        const intervalo = setInterval(() => {
            estado.textContent = mensajes[idx++ % mensajes.length];
        }, 750);

        // Transición carga → acceso
        setTimeout(() => {
            clearInterval(intervalo);
            estado.textContent = "¡Listo!";
            setTimeout(() => {
                document.getElementById("carga").classList.add("desvanecer");
                setTimeout(() => {
                    document.getElementById("carga").classList.add("oculto");
                    document.getElementById("acceso").classList.remove("oculto");
                }, 1200);
            }, 1000);
        }, 3300);

        function mostrarCrear() {
            cambiarPantalla('acceso', 'crear');
        }

        function volver() {
            cambiarPantalla('crear', 'acceso');
            cambiarPantalla('menu', 'acceso');
        }

        function irMenu(tipo) {
            document.getElementById("tituloMenu").textContent =
                tipo === 'invitado' ? "Modo Invitado" : "Tu Cuenta";
            cambiarPantalla('acceso', 'menu');
            cambiarPantalla('crear', 'menu');
        }

        function cambiarPantalla(ocultarId, mostrarId) {
            document.getElementById(ocultarId).classList.add("oculto");
            document.getElementById(mostrarId).classList.remove("oculto");
        }
    </script>
</body>
</html>
