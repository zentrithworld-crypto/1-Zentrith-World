<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World - Cargando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            /* Fondo con degradado que imita la explosión cósmica */
            background: linear-gradient(
                135deg,
                #0a0e27 0%,
                #201b66 25%,
                #702090 50%,
                #ff6b35 75%,
                #ffd029 100%
            );
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Estrellas de fondo */
        .estrella {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: parpadear 3s infinite ease-in-out;
        }

        @keyframes parpadear {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Letra Z grande */
        .letra-z {
            font-size: clamp(8rem, 25vw, 12rem);
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px #93c5fd, 0 0 40px #3b82f6;
            margin-bottom: 1rem;
            line-height: 1;
        }

        /* Nombre del juego */
        .nombre-juego {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 15px #60a5fa;
            margin-bottom: 4rem;
            letter-spacing: 2px;
        }

        /* Barra de carga */
        .contenedor-barra {
            width: 85%;
            max-width: 450px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .barra-progreso {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd029, #ff6b35, #9333ea, #3b82f6);
            border-radius: 10px;
            animation: cargar 3s ease-in-out forwards infinite;
        }

        @keyframes cargar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Texto debajo de la barra */
        .texto-carga {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            color: #e0f2fe;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <!-- Generamos algunas estrellas -->
    <script>
        for (let i = 0; i < 60; i++) {
            const estrella = document.createElement('div');
            estrella.classList.add('estrella');
            estrella.style.width = `${Math.random() * 3 + 1}px`;
            estrella.style.height = estrella.style.width;
            estrella.style.left = `${Math.random() * 100}%`;
            estrella.style.top = `${Math.random() * 100}%`;
            estrella.style.animationDelay = `${Math.random() * 3}s`;
            document.body.appendChild(estrella);
        }
    </script>

    <div class="letra-z">Z</div>
    <h1 class="nombre-juego">ZENTRITH WORLD</h1>

    <div class="contenedor-barra">
        <div class="barra-progreso"></div>
    </div>

    <p class="texto-carga">Iniciando sistemas seguros...</p>

    <!-- Opcional: para pasar automáticamente a la pantalla siguiente -->
    <script>
        setTimeout(() => {
            // Acá más adelante ponés el enlace a tu pantalla de inicio
            console.log("Carga finalizada");
            // window.location.href = "inicio.html";
        }, 3200);
    </script>
</body>
</html>
