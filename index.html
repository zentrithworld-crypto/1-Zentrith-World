<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
        body{background:#051027;color:#E2F0FF;min-height:100vh}
        .oculto{display:none!important}

        /* Carga */
        .carga{position:fixed;inset:0;background:#051027;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000}
        .carga h1{font-size:2.5rem;color:#3B82F6;margin-bottom:10px}
        .barra{width:80%;max-width:400px;height:10px;background:#0F2044;border-radius:8px;overflow:hidden;margin:15px 0}
        .progreso{width:0;height:100%;background:#2563EB;transition:width 0.03s}

        /* Formularios */
        .pantalla{max-width:450px;margin:50px auto;padding:20px;text-align:center}
        .campo{width:100%;padding:12px;margin:8px 0;background:#0F2044;border:1px solid #1E3A8A;border-radius:8px;color:white;font-size:1rem}
        .fila{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
        .opcion{flex:1;padding:10px;background:#0F2044;border:1px solid #1E3A8A;border-radius:6px;cursor:pointer}
        .opcion.activa{border-color:#3B82F6;background:#102859}

        /* Botones */
        .boton{padding:10px 14px;border:none;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:500;margin:5px}
        .azul{background:#2563EB;color:white}
        .verde{background:#15803D;color:white}
        .gris{background:#475569;color:white;cursor:not-allowed}
        .volver{background:#1E3A8A;color:white;width:100%}

        /* Servidores */
        .servidor{padding:15px;margin:10px 0;border-radius:8px;border:1px solid #1E3A8A;background:#0F2044;cursor:pointer}
        .servidor.activo{border-color:#3B82F6;background:#102859}

        /* Menú principal */
        .cabecera{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid #1E3A8A;flex-wrap:wrap;gap:15px}
        .nav{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}
        .nav-item{padding:8px 12px;border-radius:6px;cursor:pointer}
        .nav-item.activo{background:#2563EB}
        .monedas{display:flex;gap:20px}
        .tarjeta{background:#0F2044;border:1px solid #1E3A8A;border-radius:10px;padding:20px;margin-bottom:15px}

        /* Tienda */
        .categorias{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
        .cat{padding:6px 12px;border-radius:6px;background:#081838;cursor:pointer}
        .cat.activa{background:#2563EB}
        .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px,1fr));gap:12px}
        .item{background:#081838;padding:12px;border-radius:8px;border:1px solid #1E3A8A}
        .comprado{opacity:0.6}
    </style>
</head>
<body>

<!-- 1. PANTALLA DE CARGA -->
<div class="carga" id="pantallaCarga">
    <h1>ZENTRITH WORLD</h1>
    <p>Espacio seguro para jugar y crear</p>
    <div class="barra"><div class="progreso" id="barraProgreso"></div></div>
    <p id="textoCarga">Cargando sistema...</p>
</div>

<!-- 2. PANTALLA DE ACCESO -->
<div class="pantalla oculto" id="pantallaAcceso">
    <h2>📝 Ingresá tus datos</h2>
    <div class="fila">
        <input type="number" class="campo" id="dia" placeholder="Día" min="1" max="31">
        <select class="campo" id="mes">
            <option value="">Mes</option>
            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
        </select>
        <input type="number" class="campo" id="anio" placeholder="Año" min="1940" max="2025">
    </div>

    <p style="margin:15px 0">Soy:</p>
    <div class="fila">
        <div class="opcion" onclick="elegirGenero('varon')">👦 Varón</div>
        <div class="opcion" onclick="elegirGenero('chica')">👧 Chica</div>
    </div>
    <input type="hidden" id="genero">

    <input type="text" class="campo" id="usuario" placeholder="Escribí tu nombre aquí">
    <button class="boton azul" onclick="validarAcceso()">Continuar</button>
</div>

<!-- 3. PANTALLA DE SERVIDORES -->
<div class="pantalla oculto" id="pantallaServidores">
    <h2>🌐 Elegí tu servidor</h2>
    <div class="servidor activo" onclick="irAlMenu()">🟢 Servidor 1 - Zentrith Norte</div>
    <div class="servidor activo" onclick="irAlMenu()">🟢 Servidor 2 - Zentrith Sur</div>
    <button class="boton volver" onclick="volverAAcceso()">Volver</button>
</div>

<!-- 4. MENÚ PRINCIPAL -->
<div class="pantalla oculto" id="menuPrincipal">
    <div class="cabecera">
        <h2>ZENTRITH WORLD</h2>
        <div class="monedas">
            <div>🪙 <span id="txtMonedas">0</span></div>
            <div>💎 <span id="txtCristales">0</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item activo" onclick="cambiarSeccion('inicio')">Inicio</div>
        <div class="nav-item" onclick="cambiarSeccion('tienda')">🛒 Tienda</div>
        <div class="nav-item" onclick="cambiarSeccion('inventario')">🎒 Inventario</div>
    </div>

    <div id="contenido"></div>
</div>

<script>
// ⚙️ CONFIGURACIÓN - TODO LO QUE USAMOS, SIN EXTRAS
const CONFIG = {
    usuario: "",
    monedas: 0,
    cristales: 0,
    inventario: [],
    // TU CUENTA EXACTA
    creador: { 
        nombre: "El Arquitecto 🔮",
        monedas: 9999999,
        cristales: 999999
    },
    tienda: [
        {id:1, nombre:"Sombrero Mágico", precioM:250, precioC:15, desc:"Accesorio especial"},
        {id:2, nombre:"Espada Básica", precioM:500, precioC:30, desc:"Para tus aventuras"},
        {id:3, nombre:"Piedra Luminosa", precioM:120, precioC:8, desc:"Decora tus espacios"},
        {id:4, nombre:"Traje de Explorador", precioM:800, precioC:45, desc:"Ropa resistente"},
        {id:5, nombre:"Banco de Trabajo", precioM:1500, precioC:70, desc:"Herramienta de creación"}
    ]
};

// 🚀 PANTALLA DE CARGA
let progreso = 0;
const intervaloCarga = setInterval(() => {
    if(progreso < 100) {
        progreso++;
        document.getElementById("barraProgreso").style.width = progreso + "%";
        document.getElementById("textoCarga").textContent = `Cargando... ${progreso}%`;
    } else {
        clearInterval(intervaloCarga);
        setTimeout(() => {
            document.getElementById("pantallaCarga").classList.add("oculto");
            document.getElementById("pantallaAcceso").classList.remove("oculto");
        }, 500);
    }
}, 25);

// 📋 ELEGIR GÉNERO
function elegirGenero(valor) {
    document.querySelectorAll(".opcion").forEach(o => o.classList.remove("activa"));
    event.currentTarget.classList.add("activa");
    document.getElementById("genero").value = valor;
}

// ✅ VALIDAR ACCESO
function validarAcceso() {
    const dia = document.getElementById("dia").value;
    const mes = document.getElementById("mes").value;
    const anio = document.getElementById("anio").value;
    const genero = document.getElementById("genero").value;
    const usuario = document.getElementById("usuario").value.trim();

    if(!dia || !mes || !anio) return alert("Completá tu fecha de nacimiento");
    if(!genero) return alert("Elegí tu género");
    if(!usuario) return alert("Escribí tu nombre");

    CONFIG.usuario = usuario;
    // RECONOCE TU NOMBRE CON EMOJI
    if(usuario === CONFIG.creador.nombre) {
        CONFIG.monedas = CONFIG.creador.monedas;
        CONFIG.cristales = CONFIG.creador.cristales;
    } else {
        CONFIG.monedas = 0;
        CONFIG.cristales = 0;
    }

    document.getElementById("pantallaAcceso").classList.add("oculto");
    document.getElementById("pantallaServidores").classList.remove("oculto");
}

// 🔙 VOLVER ATRÁS
function volverAAcceso() {
    document.getElementById("pantallaServidores").classList.add("oculto");
    document.getElementById("pantallaAcceso").classList.remove("oculto");
}

// 🌐 ENTRAR AL JUEGO
function irAlMenu() {
    actualizarSaldos();
    document.getElementById("pantallaServidores").classList.add("oculto");
    document.getElementById("menuPrincipal").classList.remove("oculto");
    cambiarSeccion("inicio");
}

// 💰 ACTUALIZAR SALDOS
function actualizarSaldos() {
    document.getElementById("txtMonedas").textContent = CONFIG.monedas.toLocaleString("es-ES");
    document.getElementById("txtCristales").textContent = CONFIG.cristales.toLocaleString("es-ES");
}

// 🔄 CAMBIAR PANTALLAS
function cambiarSeccion(nombre) {
    document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("activo"));
    event.currentTarget.classList.add("activo");
    const cont = document.getElementById("contenido");

    if(nombre === "inicio") {
        cont.innerHTML = `<div class="tarjeta"><h3>👋 Bienvenido, ${CONFIG.usuario}</h3>
            <p>Tu saldo actual:</p>
            <p>🪙 ${CONFIG.monedas.toLocaleString("es-ES")} Monedas Z</p>
            <p>💎 ${CONFIG.cristales.toLocaleString("es-ES")} Cristales Z</p>
            <p>Probá la tienda para ver cómo funcionan las compras.</p></div>`;
    }

    else if(nombre === "tienda") {
        cont.innerHTML = `<div class="tarjeta"><h3>🛒 Tienda</h3>
            <div class="categorias"><div class="cat activa" onclick="mostrarTienda()">Todos</div></div>
            <div class="grid" id="listaTienda"></div></div>`;
        mostrarTienda();
    }

    else if(nombre === "inventario") {
        if(CONFIG.inventario.length === 0) {
            cont.innerHTML = `<div class="tarjeta"><h3>🎒 Inventario</h3><p>Aún no tenés objetos. Comprá algo en la tienda.</p></div>`;
        } else {
            let html = `<div class="tarjeta"><h3>Mis objetos</h3><div class="grid">`;
            CONFIG.inventario.forEach(i => html += `<div class="item"><h4>${i.nombre}</h4><p>${i.desc}</p></div>`);
            html += `</div></div>`;
            cont.innerHTML = html;
        }
    }
}

// 🛒 MOSTRAR TIENDA
function mostrarTienda() {
    const lista = document.getElementById("listaTienda");
    let html = "";
    CONFIG.tienda.forEach(item => {
        const yaTiene = CONFIG.inventario.some(i => i.id === item.id);
        html += `<div class="item ${yaTiene ? 'comprado' : ''}">
            <h4>${item.nombre}</h4>
            <p style="font-size:0.9rem">${item.desc}</p>
            <p>🪙 ${item.precioM} | 💎 ${item.precioC}</p>
            ${yaTiene 
                ? `<button class="boton gris" disabled>Ya lo tenés</button>` 
                : `<button class="boton verde" onclick="comprar(${item.id})">Comprar</button>`
            }
        </div>`;
    });
    lista.innerHTML = html;
}

// ✅ COMPRAR OBJETO
function comprar(id) {
    const item = CONFIG.tienda.find(i => i.id === id);
    if(!item) return;
    if(CONFIG.inventario.some(i => i.id === id)) return alert("Ya tenés este objeto");

    if(CONFIG.monedas >= item.precioM) {
        CONFIG.monedas -= item.precioM;
        CONFIG.inventario.push(item);
        actualizarSaldos();
        mostrarTienda();
        alert(`✅ Compraste: ${item.nombre}`);
    } else if(CONFIG.cristales >= item.precioC) {
        CONFIG.cristales -= item.precioC;
        CONFIG.inventario.push(item);
        actualizarSaldos();
        mostrarTienda();
        alert(`✅ Compraste: ${item.nombre}`);
    } else {
        alert("❌ No tenés saldo suficiente");
    }
}
</script>

</body>
</html>
