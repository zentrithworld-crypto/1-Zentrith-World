<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: linear-gradient(180deg, #080C26 0%, #251A63 38%, #9A3242 72%, #FF7620 92%, #FFCC32 100%);
            min-height: 100vh;
            color: #FFFFFF;
            position: relative;
            overflow: hidden;
        }

        /* Control de pantallas */
        .pantalla {
            position: absolute;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease;
        }
        .oculto { opacity: 0; visibility: hidden; }

        /* Estrellas de fondo */
        .estrella-fondo {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            animation: parpadear 3.5s infinite ease-in-out;
        }
        @keyframes parpadear { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Animaciones generales */
        @keyframes girarZ { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes brillar {
            from { text-shadow: 0 0 18px #A1B9FF, 0 0 36px #6189FF, 0 0 54px #4567FF; }
            to { text-shadow: 0 0 30px #C1D9FF, 0 0 60px #81ABFF, 0 0 90px #6189FF; }
        }

        /* ---------------- PANTALLA DE CARGA ---------------- */
        #carga {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .logo-z {
            font-size: clamp(7rem, 22vw, 11rem);
            font-weight: bold;
            animation: girarZ 6s linear infinite, brillar 3s ease-in-out infinite alternate;
        }
        .titulo { font-size: clamp(2.2rem, 9vw, 3.2rem); margin-bottom: 3.5rem; letter-spacing: 1px; }
        .contenedor-barra { width: 85%; max-width: 480px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; }
        .barra-progreso { height: 100%; width: 0%; background: linear-gradient(90deg, #FFCC32, #FF7620, #9A32CC, #4567FF); border-radius: 20px; animation: cargar 3.2s ease forwards; }
        @keyframes cargar { 0% { width: 0%; } 100% { width: 100%; } }
        .texto-carga { margin-top: 2rem; font-size: 1.5rem; }

        /* ---------------- FORMULARIOS Y ACCESO ---------------- */
        .centrar-contenido {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            min-height: 100vh;
        }
        .version { position: absolute; top: 1.5rem; font-size: 1rem; color: rgba(255,255,255,0.7); }
        .logo { font-size: clamp(5rem, 15vw, 7rem); animation: brillar 3s ease infinite alternate; margin-bottom: 1rem; }
        .subtitulo { font-size: clamp(1.8rem, 7vw, 2.4rem); margin-bottom: 2rem; text-align: center; }
        .contenedor { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1rem; z-index: 2; }
        .fila-fecha { display: flex; gap: 0.8rem; }
        input, select {
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: #FFFFFF;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }
        input::placeholder, select { color: rgba(255,255,255,0.7); }
        select option { background: #251A63; color: #FFFFFF; }
        .boton {
            padding: 1.1rem;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.15rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .boton:hover { transform: translateY(-2px); }
        .boton-naranja { background: linear-gradient(90deg, #FFCC32, #FF7620); color: #000; }
        .boton-azul { background: linear-gradient(90deg, #9A32CC, #4567FF); color: #FFFFFF; }
        .texto-ayuda { text-align: center; margin: 0.5rem 0; color: rgba(255,255,255,0.8); }

        /* ---------------- MENÚ PRINCIPAL ---------------- */
        .barra-superior {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.5rem;
            background: rgba(8, 12, 38, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .icono-menu { font-size: 1.7rem; cursor: pointer; color: #FFCC32; }
        .logo-titulo { font-size: 2.2rem; font-weight: bold; color: #FFCC32; letter-spacing: 1px; }
        .iconos-derecha { display: flex; gap: 1.8rem; align-items: center; }
        .icono { font-size: 1.6rem; cursor: pointer; color: #FFFFFF; }
        .estrella-notif { color: #FFCC32; font-size: 1.8rem; }

        .tarjeta-perfil {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            margin: 1rem;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FF7620, #4567FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #FFFFFF;
        }
        .info-usuario { flex: 1; }
        .nombre-usuario { font-size: 1.6rem; font-weight: 500; margin-bottom: 0.2rem; }
        .rango { font-size: 1rem; color: rgba(255,255,255,0.7); }
        .moneda {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFCC32;
        }

        .seccion-explorar { padding: 0 1.5rem 8rem; }
        .titulo-seccion { font-size: 1.7rem; margin: 1.5rem 0 1rem; font-weight: 500; }
        .boton-jugar {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.3rem;
            margin-top: 2rem;
        }

        .barra-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0.9rem 0;
            background: rgba(8, 12, 38, 0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .item-navegacion {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }
        .item-navegacion.activo { color: #FFCC32; }
        .icono-nav { font-size: 1.5rem; }

        /* ---------------- PANTALLA DE JUEGO - PERSONAJE ---------------- */
        #juego {
            background: linear-gradient(180deg, #4A90E2 0%, #B3D8F4 100%);
            overflow: hidden;
        }
        .suelo-juego {
            width: 100%;
            height: 120px;
            background: #2E7D32;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        /* Personaje estilo cubos */
        .personaje {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            transition: transform 0.1s ease, left 0.15s ease;
        }

        .nombre-arriba {
            color: #FFFFFF;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            text-shadow: 0 0 4px #000000;
            user-select: none;
        }

        /* Cabeza con todas las caras definidas */
        .cabeza {
            width: 42px;
            height: 42px;
            background: #FFCC32;
            border: 2px solid #333333;
            border-radius: 2px;
            position: relative;
            margin-bottom: 4px;
        }
        .cara-frente {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .ojos {
            display: flex;
            gap: 8px;
        }
        .ojo {
            width: 6px;
            height: 6px;
            background: #000000;
            border-radius: 50%;
        }
        .boca {
            width: 12px;
            height: 3px;
            background: #000000;
            border-radius: 2px;
        }
        .cara-izquierda, .cara-derecha, .cara-atras {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: #E6B82E;
            display: none;
        }

        .torso {
            width: 46px;
            height: 54px;
            background: #4567FF;
            border: 2px solid #222222;
            margin-bottom: 4px;
        }
        .piernas {
            display: flex;
            gap: 6px;
        }
        .pierna {
            width: 19px;
            height: 50px;
            background: #9A32CC;
            border: 2px solid #222222;
            transform-origin: top center;
        }

        /* Animación caminar */
        @keyframes caminar {
            0% { transform: rotateZ(18deg); }
            100% { transform: rotateZ(-18deg); }
        }
        .caminando .pierna { animation: caminar 0.4s infinite alternate ease-in-out; }
        .quieto .pierna { animation: none; }

        /* Botón volver al menú */
        .boton-volver {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            padding: 0.8rem 1.2rem;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        /* ---------------- PANTALLAS AGREGADAS ---------------- */
        /* 7. Pantalla de Configuración */
        #configuracion {
            background: linear-gradient(180deg, #080C26 0%, #251A63 100%);
            padding: 2rem;
            overflow-y: auto;
        }
        .titulo-pantalla {
            text-align: center;
            font-size: 2.2rem;
            margin: 2rem 0;
            color: #FFCC32;
        }
        .grupo-opciones {
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .opcion {
            background: rgba(255,255,255,0.1);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            width: 45px;
            height: 24px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            position: relative;
            cursor: pointer;
        }
        .switch.activo { background: #4567FF; }
        .switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.2s;
        }
        .switch.activo::after { transform: translateX(21px); }

        /* 8. Pantalla de Personalización de Avatar */
        #avatar {
            background: linear-gradient(180deg, #251A63 0%, #9A3242 100%);
            padding: 2rem;
            overflow-y: auto;
        }
        .vista-previa {
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            background: linear-gradient(45deg, #FF7620, #4567FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 25px rgba(255,204,50,0.5);
        }
        .colores {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        .color {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color.seleccionado { border-color: #FFFFFF; transform: scale(1.1); }

        /* 9. Pantalla de Amigos */
        #amigos {
            background: linear-gradient(180deg, #080C26 0%, #4567FF 100%);
            padding: 2rem;
            overflow-y: auto;
        }
        .lista-amigos {
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .tarjeta-amigo {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .estado-amigo {
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .en-linea { background: #2E7D32; }
        .desconectado { background: #666666; }
    </style>
</head>
<body>

    <!-- Generar estrellas de fondo -->
    <script>
        for (let i = 0; i < 80; i++) {
            const estrella = document.createElement('div');
            estrella.className = 'estrella-fondo';
            const tamaño = Math.random() * 2.5 + 0.8;
            estrella.style.width = estrella.style.height = `${tamaño}px`;
            estrella.style.left = `${Math.random() * 100}%`;
            estrella.style.top = `${Math.random() * 100}%`;
            estrella.style.animationDelay = `${Math.random() * 4}s`;
            document.body.appendChild(estrella);
        }
    </script>

    <!-- 1. Pantalla de Carga -->
    <div id="carga" class="pantalla">
        <div class="logo-z">Z</div>
        <h1 class="titulo">ZENTRITH WORLD</h1>
        <div class="contenedor-barra"><div class="barra-progreso"></div></div>
        <p class="texto-carga" id="estado">Iniciando sistemas seguros...</p>
    </div>

    <!-- 2. Pantalla de Acceso -->
    <div id="acceso" class="pantalla oculto centrar-contenido">
        <div class="version">Versión 0.1</div>
        <div class="logo">Z</div>
        <h1 class="subtitulo">ZENTRITH WORLD</h1>
        <div class="contenedor">
            <button class="boton boton-naranja" onclick="mostrarCorreo()">Crear cuenta con correo</button>
            <button class="boton boton-azul" onclick="mostrarInvitado()">Entrar como Invitado</button>
        </div>
    </div>

    <!-- 3. Formulario Cuenta con Correo -->
    <div id="form-correo" class="pantalla oculto centrar-contenido">
        <div class="version">Versión 0.1</div>
        <h2 class="subtitulo">Datos de tu cuenta</h2>
        <div class="contenedor">
            <input type="text" placeholder="Nombre de jugador" required id="nombreCorreo">
            <select id="generoCorreo">
                <option value="">Niño / Niña</option>
                <option value="nino">Niño</option>
                <option value="nina">Niña</option>
            </select>
            <p class="texto-ayuda">Tu fecha de nacimiento</p>
            <div class="fila-fecha">
                <input type="number" min="1" max="31" placeholder="Día" id="diaCorreo">
                <select id="mesCorreo">
                    <option value="">Mes</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                    <option value="03">Marzo</option>
                    <option value="04">Abril</option>
                    <option value="05">Mayo</option>
                    <option value="06">Junio</option>
                    <option value="07">Julio</option>
                    <option value="08">Agosto</option>
                    <option value="09">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
                <input type="number" min="1940" max="2020" placeholder="Año" id="anioCorreo">
            </div>
            <input type="email" placeholder="Correo electrónico" required id="correo">
            <input type="password" placeholder="Contraseña" required id="clave">
            <button class="boton boton-naranja" onclick="irMenu()">Guardar y entrar</button>
            <button class="boton boton-azul" onclick="volverInicio()">Volver</button>
        </div>
    </div>

    <!-- 4. Formulario Cuenta Invitado -->
    <div id="form-invitado" class="pantalla oculto centrar-contenido">
        <div class="version">Versión 0.1</div>
        <h2 class="subtitulo">Datos de invitado</h2>
        <div class="contenedor">
            <input type="text" placeholder="Nombre de jugador" required id="nombreInvitado">
            <select id="generoInvitado">
                <option value="">Niño / Niña</option>
                <option value="nino">Niño</option>
                <option value="nina">Niña</option>
            </select>
            <p class="texto-ayuda">Tu fecha de nacimiento</p>
            <div class="fila-fecha">
                <input type="number" min="1" max="31" placeholder="Día" id="diaInvitado">
                <select id="mesInvitado">
                    <option value="">Mes</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                    <option value="03">Marzo</option>
                    <option value="04">Abril</option>
                    <option value="05">Mayo</option>
                    <option value="06">Junio</option>
                    <option value="07">Julio</option>
                    <option value="08">Agosto</option>
                    <option value="09">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
                <input type="number" min="1940" max="2020" placeholder="Año" id="anioInvitado">
            </div>
            <button class="boton boton-naranja" onclick="irMenu()">Entrar como invitado</button>
            <button class="boton boton-azul" onclick="volverInicio()">Volver</button>
        </div>
    </div>

    <!-- 5. Menú Principal -->
    <div id="menu" class="pantalla oculto">
        <div class="barra-superior">
            <div class="icono-menu">☰</div>
            <div class="logo-titulo">ZENTRITH</div>
            <div class="iconos-derecha">
                <div class="icono">🔍</div>
                <div class="icono" onclick="irConfiguracion()">⚙️</div>
                <div class="icono estrella-notif">✦</div>
            </div>
        </div>

        <div class="tarjeta-perfil">
            <div class="avatar">Z</div>
            <div class="info-usuario">
                <div class="nombre-usuario" id="mostrarNombreMenu">Jugador</di
