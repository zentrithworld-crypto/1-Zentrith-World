<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Zentrith World</title><style>:root{--fondo:#051027;--superficie:#0F2044;--superficie-alt:#102859;--borde:#1E3A8A;--texto:#E2F0FF;--texto-suave:#94A3B8;--acento:#3B82F6;--acento-suave:#93C5FD;--sombra:0 2px 8px rgba(59,130,246,0.15);--radio:8px;--texto-base:1rem;--texto-h2:1.5rem;--texto-h3:1.25rem;--opacidad-general:1}*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}body{background:var(--fondo);color:var(--texto);font-size:var(--texto-base);opacity:var(--opacidad-general);transition:all 0.4s ease}#contenedor{max-width:500px;margin:0 auto;padding:15px}h2{font-size:var(--texto-h2);margin-bottom:15px;color:var(--acento)}h3{font-size:var(--texto-h3);margin:12px 0;color:var(--acento-suave)}.tarjeta{background:var(--superficie);border:1px solid var(--borde);border-radius:var(--radio);padding:12px;margin:8px 0;box-shadow:var(--sombra)}.tarjeta-grande{background:var(--superficie);border:1px solid var(--borde);border-radius:var(--radio);padding:20px;margin:15px 0;box-shadow:var(--sombra)}.boton{border:none;border-radius:var(--radio);padding:10px 14px;margin:5px 0;cursor:pointer;font-size:1rem;transition:0.2s}.boton-azul{background:var(--acento);color:white}.boton-gris{background:var(--superficie-alt);color:var(--texto)}.boton-verde{background:#10B981;color:white}.boton-rojo{background:#EF4444;color:white}.boton:disabled{opacity:0.5;cursor:not-allowed}.campo{width:100%;padding:10px;margin:8px 0;background:var(--superficie-alt);border:1px solid var(--borde);border-radius:var(--radio);color:var(--texto)}.modo-sin-animaciones *{animation:none!important;transition:none!important}.modo-alto-contraste{--texto:#FFFFFF;--texto-suave:#E0E0E0;--borde:#FFFFFF;--acento:#FFFF00}</style></head><body><div id="contenedor"></div><script>const CONFIG={usuario:"",edad:0,nivel:1,experiencia:0,monedasZ:0,cristalesZ:0,energia:200,energiaMaxima:200,verificado:false,restricciones:{},misionesCompletadas:[]};const PROTECCION={edades:{minima:8,nivelBasico:8,nivelMedio:10,nivelSeguro:13,nivelAvanzado:16,edadVerificacionObligatoria:13},filtros:{palabrasProhibidas:["insulto","violencia","abuso","maltrato","sexo","porno","desnudo","link","pagina","whatsapp","telefono","direccion","dinero","pago","estafa","amenaza","muerte","suicidio","drogas","arma"],expresionesRiesgo:["dame tu","hablamos por","te paso mi","donde vivis","cuanto tenes"]},verificacion:{metodo:"fecha + foto",tiempoBorradoFoto:7200000,guardarDatos:false,avisoPadres:true,reintentosPermitidos:2},interacciones:{menoresDe13:{chat:"solo frases predefinidas",mensajesPrivados:"bloqueados",agregarAmigos:"solo aprobacion tutor",compartirDatos:"bloqueado"},mayoresDe13:{chat:"con filtro automatico",mensajesPrivados:"permitidos control",agregarAmigos:"libre registrado"}},alertas:{activarAutomaticas:true,alTutor:true,moderacion:"24h",bloqueoInmediato:true,historial:90},cierre:{activarProtocolo:true,borrarDatos:true,modoMemorial:{activable:true,sinCuentas:true,soloMensajeAprobado:true,sinDatosPrivados:true}},normativas:{copa:true,gdpr:true,leyesArgentina:true}};const ECONOMIA={monedas:{nombre:"Monedas Z",simbolo:"🪙",obtencion:"solo juego",limiteDiario:5000,limiteTotal:9999999},cristales:{nombre:"Cristales Z",simbolo:"💎",obtencion:"logros misiones",limiteDiario:200,limiteTotal:999999},energia:{nombre:"Energia",simbolo:"⚡",recarga:5,maxPorNivel:[{nivel:1,max:200},{nivel:5,max:220},{nivel:10,max:250},{nivel:15,max:280},{nivel:20,max:320},{nivel:30,max:380},{nivel:50,max:500}]},tablaNiveles:[{nivel:1,exp:0,recompensa:{monedas:50,cristales:2,energia:10}},{nivel:2,exp:120,recompensa:{monedas:70,cristales:3,energia:10}},{nivel:3,exp:250,recompensa:{monedas:90,cristales:3,energia:15}},{nivel:4,exp:400,recompensa:{monedas:120,cristales:4,energia:15}},{nivel:5,exp:600,recompensa:{monedas:150,cristales:5,energia:20}},{nivel:6,exp:850,recompensa:{monedas:180,cristales:5,energia:20}},{nivel:7,exp:1150,recompensa:{monedas:220,cristales:6,energia:25}},{nivel:8,exp:1500,recompensa:{monedas:260,cristales:7,energia:25}},{nivel:9,exp:1900,recompensa:{monedas:300,cristales:8,energia:30}},{nivel:10,exp:2350,recompensa:{monedas:350,cristales:10,energia:30}},...Array.from({length:90},(_,i)=>({nivel:11+i,exp:Math.round(2350*Math.pow(1.12,i+1)),recompensa:{monedas:Math.round(350*Math.pow(1.08,i+1)),cristales:Math.round(10+i*0.3),energia:30+Math.floor(i/5)*5}}))],misiones:{diarias:[{id:"d1",titulo:"Primer inicio",desc:"Ingresar hoy",exp:20,monedas:30,cristales:1,energia:5},{id:"d2",titulo:"Explorador",desc:"Visitar 2 zonas",exp:35,monedas:50,cristales:1,energia:8},{id:"d3",titulo:"Personalizar",desc:"Cambiar apariencia",exp:25,monedas:40,cristales:2,energia:5},{id:"d4",titulo:"Seguro",desc:"Leer reglas",exp:15,monedas:20,cristales:1,energia:3}],semanales:[{id:"s1",titulo:"Semana activa",desc:"Jugar 5 dias",exp:150,monedas:300,cristales:8,energia:25},{id:"s2",titulo:"Ayudante",desc:"Reportar o ayudar",exp:200,monedas:400,cristales:12,energia:30}],logros:[{id:"l1",titulo:"Bienvenido",desc:"Nivel 5",monedas:200,cristales:15,energia:50,desbloquea:"Zonas avanzadas"},{id:"l2",titulo:"Veterano",desc:"Nivel 20",monedas:800,cristales:40,energia:100,desbloquea:"Equipos especiales"}]}};const AUDIO={volumenGeneral:70,volumenMusica:60,volumenEfectos:80,volumenVoces:90,balance:0,modoSalida:"parlante",ahorroBateria:{activo:true,umbral:20,reducir:30},activo:true,lista:{musica:{inicio:{archivo:"audio/inicio.mp3",bucle:true,vol:0.5},menu:{archivo:"audio/menu.mp3",bucle:true,vol:0.4},zonaSegura:{archivo:"audio/segura.mp3",bucle:true,vol:0.45},zonaAbandonada:{archivo:"audio/oscura.mp3",bucle:true,vol:0.35}},efectos:{clic:{archivo:"audio/clic.mp3",vol:0.6},pasar:{archivo:"audio/pasar.mp3",vol:0.4},confirmar:{archivo:"audio/ok.mp3",vol:0.7},error:{archivo:"audio/error.mp3",vol:0.65},aviso:{archivo:"audio/aviso.mp3",vol:0.7}}},limites:{parlante:75,auriculares:90}};const DISEÑO={modoActivo:"normal",animaciones:true,altoContraste:false,tamañoTexto:"medio",esquinas:"redondeadas",modos:{normal:{fondo:"#051027",superficie:"#0F2044",borde:"#1E3A8A",texto:"#E2F0FF",acento:"#3B82F6"},oscuro:{fondo:"#020818",superficie:"#0A1228",borde:"#122652",texto:"#CBD5F1",acento:"#2563EB"},abandonado:{fondo:"#0F0A05",superficie:"#1A120B",borde:"#3A2A1A",texto:"#D9C7B8",acento:"#926A3E"},memorial:{fondo:"#080810",superficie:"#12121F",borde:"#252540",texto:"#C5C5E0",acento:"#6B6BA8"}},tamaños:{chico:{base:"0.9rem",h2:"1.3rem"},medio:{base:"1rem",h2:"1.5rem"},grande:{base:"1.1rem",h2:"1.7rem"}},bordes:{rectas:"0px",redondeadas:"8px",muy:"16px"}};const MUNDO={zonas:[{id:"inicio",nombre:"Plaza Central",descripcion:"Lugar seguro",nivelMinimo:1,musica:"zonaSegura",objetos:["cartel_reglas","cofre_bienvenida"]},{id:"exploracion",nombre:"Bosque Recuerdos",descripcion:"Explora y consigue materiales",nivelMinimo:5,musica:"zonaSegura",objetos:["arbustos","rocas"]},{id:"olvidada",nombre:"Zona Abandonada",descripcion:"Historia antigua",nivelMinimo:12,musica:"zonaAbandonada",objetos:["ruinas","letreros_viejos"]},{id:"memorial",nombre:"Sitio Recuerdos",descripcion:"Espacio tranquilo",nivelMinimo:1,musica:"zonaAbandonada",objetos:["placas","arboles"]}],acciones:{recolectar:{energia:5,exp:10,monedas:8},examinar:{energia:2,exp:5,monedas:3}}};const INVENTARIO={objetos:[],capacidad:20,agregar:function(n,c=1){const e=this.objetos.find(o=>o.nombre===n);e?e.cantidad+=c:this.objetos.push({nombre:n,cantidad:c})}};let reproductorMusica=new Audio(),reproductorEfecto=new Audio(),contenedor=document.getElementById("contenedor");function aplicarRestricciones(){CONFIG.restricciones=CONFIG.edad<13?PROTECCION.interacciones.menoresDe13:PROTECCION.interacciones.mayoresDe13;return CONFIG.restricciones}function filtrarTexto(t){const l=t.toLowerCase();return!PROTECCION.filtros.palabrasProhibidas.some(p=>l.includes(p))&&!PROTECCION.filtros.expresionesRiesgo.some(f=>l.includes(f))}function agregarExperiencia(e){if(!e)return;CONFIG.experiencia+=e;const sig=ECONOMIA.tablaNiveles.find(n=>n.nivel===CONFIG.nivel+1);if(sig&&CONFIG.experiencia>=sig.exp){CONFIG.nivel++;CONFIG.experiencia-=sig.exp;CONFIG.monedasZ=Math.min(CONFIG.monedasZ+sig.recompensa.monedas,9999999);CONFIG.cristalesZ=Math.min(CONFIG.cristalesZ+sig.recompensa.cristales,999999);CONFIG.energia=Math.min(CONFIG.energia+sig.recompensa.energia,CONFIG.energiaMaxima);alert(`🎉 Subiste al nivel ${CONFIG.nivel}`);agregarExperiencia(0)}}function actualizarEnergia(){const r=ECONOMIA.energia.maxPorNivel.reverse().find(n=>CONFIG.nivel>=n.nivel);CONFIG.energiaMaxima=r?r.max:200;CONFIG.energia=Math.min(CONFIG.energia,CONFIG.energiaMaxima)}function iniciarRecarga(){setInterval(()=>{if(CONFIG.energia<CONFIG.energiaMaxima)CONFIG.energia=Math.min(CONFIG.energia+0.83,CONFIG.energiaMaxima)},10000)}function completarMision(t,i){const m=ECONOMIA.misiones[t].find(x=>x.id===i);if(!m||CONFIG.misionesCompletadas.includes(t+"-"+i))return;agregarExperiencia(m.exp);CONFIG.monedasZ+=m.monedas;CONFIG.cristalesZ+=m.cristales;CONFIG.energia+=m.energia;CONFIG.misionesCompletadas.push(t+"-"+i);alert("✅ Misión completada")}function ajustarAudio(){const l=AUDIO.limites[AUDIO.modoSalida];AUDIO.volumenGeneral=Math.min(AUDIO.volumenGeneral,l);reproductorMusica.volume=AUDIO.volumenGeneral*AUDIO.volumenMusica/10000;reproductorEfecto.volume=AUDIO.volumenGeneral*AUDIO.volumenEfectos/10000}function reproducirMusica(n){if(!AUDIO.activo)return;const d=AUDIO.lista.musica[n];reproductorMusica.pause();reproductorMusica.src=d.archivo;reproductorMusica.loop=d.bucle;ajustarAudio();reproductorMusica.play().catch(()=>{})}function reproducirEfecto(n){if(!AUDIO.activo)return;const d=AUDIO.lista.efectos[n];reproductorEfecto.src=d.archivo;reproductorEfecto.volume=d.vol*(AUDIO.volumenGeneral/100);reproductorEfecto.play().catch(()=>{})}function aplicarModo(){const m=DISEÑO.modos[DISEÑO.modoActivo];document.documentElement.style.setProperty("--fondo",m.fondo);document.documentElement.style.setProperty("--superficie",m.superficie);document.documentElement.style.setProperty("--borde",m.borde);document.documentElement.style.setProperty("--texto",m.texto);document.documentElement.style.setProperty("--acento",m.acento);const t=DISEÑO.tamaños[DISEÑO.tamañoTexto];document.documentElement.style.setProperty("--texto-base",t.base);document.documentElement.style.setProperty("--texto-h2",t.h2);DISEÑO.animaciones?document.body.classList.remove("modo-sin-animaciones"):document.body.classList.add("modo-sin-animaciones");DISEÑO.altoContraste?document.body.classList.add("modo-alto-contraste"):document.body.classList.remove("modo-alto-contraste")}function cambiarModo(n){if(!DISEÑO.modos[n])return;DISEÑO.modoActivo=n;aplicarModo();reproducirEfecto("confirmar")}function mostrarPantalla(n){switch(n){case"inicio":contenedor.innerHTML=`<div class="tarjeta-grande"><h2>Zentrith World</h2><p>Tu mundo seguro</p><button class="boton boton-azul" onclick="mostrarPantalla('acceso')">Empezar</button></div>`;break;case"acceso":contenedor.innerHTML=`<div class="tarjeta-grande"><h2>Ingreso</h2><input type="text" class="campo" placeholder="Tu nombre" id="nom"><input type="date" class="campo" id="fecha"><button class="boton boton-azul" onclick="CONFIG.usuario=document.getElementById('nom').value;CONFIG.edad=calcularEdad(document.getElementById('fecha').value);if(CONFIG.edad>=8){mostrarPantalla('menu')}else{alert('Edad mínima 8 años')}">Entrar</button></div>`;break;case"menu":contenedor.innerHTML=`<div class="tarjeta-grande"><h2>Menú Principal</h2><p>Nivel: ${CONFIG.nivel} | 🪙 ${CONFIG.monedasZ} | 💎 ${CONFIG.cristalesZ} | ⚡ ${Math.round(CONFIG.energia)}/${CONFIG.energiaMaxima}</p><br><h3>Zonas</h3>${MUNDO.zonas.map(z=>`<button class="boton boton-azul" onclick="irAZona('${z.id}')" ${CONFIG.nivel<z.nivelMinimo?"disabled":""}>${CONFIG.nivel<z.nivelMinimo?"🔒":"📍"} ${z.nombre}</button>`).join("")}<br><br><button class="boton boton-gris" onclick="mostrarPantalla('misiones')">📜 Misiones</button><button class="boton boton-gris" onclick="mostrarPantalla('ajustes')">⚙️ Ajustes</button></div>`;break;case"misiones":contenedor.innerHTML=`<div class="tarjeta-grande"><h2>Misiones</h2>${ECONOMIA.misiones.diarias.map(m=>`<div class="tarjeta"><h4>${m.titulo}</h4><p>${m.desc}</p><p>🎁 +${m.exp} EXP | +${m.monedas} 🪙</p><button class="boton boton-verde" onclick="completarMision('diarias','${m.id}')" ${CONFIG.misionesCompletadas.includes("diarias-"+m.id)?"disabled":""}>${CONFIG.misionesCompletadas.includes("diarias-"+m.id)?"Hecho":"Marcar"}</button></div>`).join("")}<br><button class="boton boton-gris" onclick="mostrarPantalla('menu')">Volver</button></div>`;break;case"ajustes":contenedor.innerHTML=`<div class="tarjeta-grande"><h2>Ajustes</h2><h3>🔊 Sonido</h3><p>Volumen: ${AUDIO.volumenGeneral}%</p><input type="range" min="0" max="100" value="${AUDIO.volumenGeneral}" oninput="AUDIO.volumenGeneral=this.value;ajustarAudio()"><br><h3>🎨 Diseño</h3><button class="boton boton-azul" onclick="cambiarModo('normal')">Clásico</button><button class="boton boton-gris" onclick="cambiarModo('oscuro')">Oscuro</button><button class="boton boton-amarillo" onclick="cambiarModo('abandonado')">Olvido</button><button class="boton boton-morado" onclick="cambiarModo('memorial')">Recuerdos</button><br><br><button class="boton boton-gris" onclick="mostrarPantalla('menu')">Volver</button></div>`;break}}function calcularEdad(f){const hoy=new Date(),nac=new Date(f);let edad=hoy.getFullYear()-nac.getFullYear();const m=hoy.getMonth()-nac.getMonth();if(m<0||(m===0&&hoy.getDate()<nac.getDate()))edad--;return edad}function irAZona(id){const z=MUNDO.zonas.find(x=>x.id===id);if(!z)return;if(CONFIG.nivel<z.nivelMinimo){alert("Nivel insuficiente");return}reproducirMusica(z.musica);z.id==="olvidada"?cambiarModo("abandonado"):z.id==="memorial"?cambiarModo("memorial"):cambiarModo("normal");mostrarZona(z)}function mostrarZona(z){contenedor.innerHTML=`<div class="tarjeta-grande"><h2>${z.nombre}</h2><p>${z.descripcion}</p><br><h4>Interactuar:</h4>${z.objetos.map(o=>`<button class="boton boton-azul" onclick="interactuar('${o}')">🔘 ${o.replace("_"," ")}</button>`).join("")}<br><br><div><p>🔊 Volumen rápido: <span>${AUDIO.volumenGeneral}%</span></p><input type="range" min="0" max="100" value="${AUDIO.volumenGeneral}" oninput="AUDIO.volumenGeneral=this.value;ajustarAudio();this.previousElementSibling.textContent=this.value+'%'"></div><br><button class="boton boton-gris" onclick="mostrarPantalla('menu')">↩️ Volver</button></div>`}function interactuar(n){if(CONFIG.energia<3){alert("Poca energía");return}const a=Math.random()>0.3?"recolectar":"examinar";const d=MUNDO.acciones[a];CONFIG.energia-=d.energia;agregarExperiencia(d.exp);CONFIG.monedasZ=Math.min(CONFIG.monedasZ+d.monedas,9999999);INVENTARIO.agregar(n);reproducirEfecto("confirmar")}window.onload=()=>{aplicarModo();actualizarEnergia();iniciarRecarga();mostrarPantalla("inicio")}</script></body></html>
