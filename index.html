<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0F172A;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estilos de la pantalla de carga */
        .pantalla-carga {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #0F172A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .pantalla-carga.oculta {
            opacity: 0;
            pointer-events: none;
        }

        h1.titulo-carga {
            font-size: 4.5rem;
            text-align: center;
            color: #FFFFFF;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitulo-carga {
            font-size: 1.3rem;
            color: #93C5FD;
            margin-bottom: 50px;
            text-align: center;
        }

        .barra-carga {
            width: 80%;
            height: 12px;
            background-color: #1E293B;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progreso {
            width: 0%;
            height: 100%;
            background-color: #2563EB;
            border-radius: 10px;
            transition: width 0.08s linear;
        }

        .texto-carga {
            font-size: 1.1rem;
            color: #CBD5E1;
        }

        /* Estilos del menú principal */
        .menu-principal {
            width: 100%;
            max-width: 500px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .menu-principal.mostrar {
            opacity: 1;
        }

        .botones-superiores {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 60px;
        }

        .boton {
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 5px;
            box-shadow: 0 4px 0 #1E40AF;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .boton:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1E40AF;
        }

        h2.titulo-menu {
            font-size: 3rem;
            color: #F59E0B;
            margin-bottom: 10px;
        }

        .creado-por {
            font-size: 1.2rem;
            color: #F59E0B;
            margin-bottom: 40px;
        }

        .grupo-botones {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }

        .boton-ancho {
            width: 220px;
        }

        .informacion {
            background-color: #1E293B;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            margin: 0 auto;
        }

        .info-linea {
            font-size: 1rem;
            color: #E2E8F0;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Carga -->
    <div class="pantalla-carga" id="pantallaCarga">
        <h1 class="titulo-carga">ZENTRITH WORLD</h1>
        <p class="subtitulo-carga">EL MUNDO QUE ESTABAS ESPERANDO</p>
        
        <div class="barra-carga">
            <div class="progreso" id="progreso"></div>
        </div>
        <p class="texto-carga" id="estadoCarga">Cargando mundo... 0%</p>
    </div>

    <!-- Menú Principal -->
    <div class="menu-principal" id="menuPrincipal">
        <div class="botones-superiores">
            <button class="boton">Configuración</button>
            <button class="boton">Noticias</button>
        </div>

        <h2 class="titulo-menu">ZENTRITH WORLD</h2>
        <p class="creado-por">Creado por: AQUÍ_TU_NOMBRE</p>

        <div class="grupo-botones">
            <button class="boton boton-ancho">Iniciar Sesión</button>
            <button class="boton boton-ancho">Crear Cuenta</button>
            <button class="boton boton-ancho">Entrar como Invitado</button>
        </div>

        <div class="informacion">
            <p class="info-linea">Jugadores en línea: 1247</p>
            <p class="info-linea">Eventos activos: 2</p>
        </div>
    </div>

    <script>
        // Lógica de la carga
        let porcentaje = 0;
        const progreso = document.getElementById('progreso');
        const estado = document.getElementById('estadoCarga');
        const pantallaCarga = document.getElementById('pantallaCarga');
        const menuPrincipal = document.getElementById('menuPrincipal');

        const intervalo = setInterval(() => {
            porcentaje += 2;
            progreso.style.width = `${porcentaje}%`;
            estado.textContent = `Cargando mundo... ${porcentaje}%`;

            if (porcentaje >= 100) {
                clearInterval(intervalo);
                estado.textContent = "¡Mundo listo!";
                // Mostrar el menú después de un momento after completar carga
                setTimeout(() => {
                    pantallaCarga.classList.add('oculta');
                    menuPrincipal.classList.add('mostrar');
                }, 600);
            }
        }, 80);
    </script>

</body>
</html>
